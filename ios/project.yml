name: CardShowPro
options:
  bundleIdPrefix: com.cardshowpro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.cardshowpro.app
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_PREVIEWS: YES

targets:
  CardShowPro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CardShowPro
        excludes:
          - "**/*.md"
    resources:
      - path: CardShowPro/Resources/Assets.xcassets
      - path: CardShowPro/Resources/card_names_cache.json
    info:
      path: CardShowPro/Resources/Info.plist
      properties:
        CFBundleName: CardShow Pro
        CFBundleDisplayName: CardShow Pro
        CFBundleVersion: "1"
        CFBundleShortVersionString: "2.0.0"
        NSCameraUsageDescription: "CardShow Pro uses your camera to identify trading cards in real time."
        NSPhotoLibraryUsageDescription: "CardShow Pro can save card images to your photo library."
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
